<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body{
            font-family: Arial;
            padding: 40px;
        }

        input, button{
            display: block;
            margin-bottom: 10px;
            padding: 10px;
            width: 250px;
        }

        #mensagem{
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Sistema de Login</h1>

    <input type="text" id="usuario" placeholder="Usuário">

    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <div id="mensagem"></div>

    <script src="script.js"></script>

</body>
</html>
